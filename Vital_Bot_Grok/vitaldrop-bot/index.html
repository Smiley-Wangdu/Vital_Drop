<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VitalDrop Chatbot</title>
  <link rel="stylesheet" href="frontend/css/chatbot.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .demo-notice {
      text-align: center;
      max-width: 480px;
      padding: 40px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .demo-notice h1 { color: #C0392B; margin-bottom: 8px; }
    .demo-notice p { color: #666; line-height: 1.6; }
    .demo-notice code {
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
      color: #C0392B;
    }
  </style>
</head>
<body>

  <div class="demo-notice">
    <h1>VitalDrop</h1>
    <p>Demo host page. The chatbot widget is in the <strong>bottom-right corner</strong>.</p>
    <p>Powered by <code>Groq AI</code> with a Nurse Consultant personality.</p>
  </div>

  <!-- ==============================
       VITALDROP CHATBOT WIDGET
       Embed this block on any page
       ============================== -->
  <div id="vitaldrop-widget">

    <!-- Toggle Button -->
    <button id="vd-toggle-btn" aria-label="Open VitalDrop Chat">
      <span id="vd-icon-open">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </span>
      <span id="vd-icon-close" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </span>
    </button>

    <!-- Chat Window -->
    <div id="vd-chat-window" aria-hidden="true">

      <!-- Header -->
      <div id="vd-header">
        <div id="vd-header-left">
          <div id="vd-logo-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C12 2 5 10.5 5 15a7 7 0 0 0 14 0C19 10.5 12 2 12 2z"/>
            </svg>
          </div>
          <div>
            <div id="vd-title">VitalDrop Assistant</div>
            <div id="vd-subtitle">Nurse Consultant - Online</div>
          </div>
        </div>
        <button id="vd-close-btn" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Messages -->
      <div id="vd-messages" role="log" aria-live="polite"></div>

      <!-- Quick Replies -->
      <div id="vd-quick-replies">
        <button class="vd-quick-btn" data-msg="How do I donate blood?">Donate Blood</button>
        <button class="vd-quick-btn" data-msg="How do I find blood?">Find Blood</button>
        <button class="vd-quick-btn" data-msg="Am I eligible to donate blood?">Eligibility</button>
        <button class="vd-quick-btn" data-msg="How do I find a blood bank?">Blood Banks</button>
      </div>

      <!-- Input -->
      <div id="vd-input-area">
        <input
          type="text"
          id="vd-input"
          placeholder="Ask me anything about blood donation..."
          autocomplete="off"
          maxlength="500"
        />
        <button id="vd-send-btn" aria-label="Send">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

    </div>
  </div>
  <!-- ==============================
       END VITALDROP CHATBOT WIDGET
       ============================== -->

  <script src="frontend/js/chatbot.js"></script>
</body>
</html>
